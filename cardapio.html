<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio - Quarteto </title>
    <link rel="stylesheet" href="css/CardapioStyle.css">
</head>
<body>

<header>
    <div class="logo">☕ Quarteto </div>
    <nav>
        <a href="index.html">Home</a>
        <a href="sobre.html">Sobre</a>
        <a href="cardapio.html" class="ativo">Cardápio</a>
        <a href="contato.html">Contato</a>
    </nav>
</header>

<main class="tela-dividida">
    
    <section class="lado-cardapio">
        <div class="conteudo-cardapio">
            <span class="destaque">BEM-VINDO AO AROMA CAFÉ</span>
            <h1>Coffee Menu</h1>
            <div class="divisor-menu"></div>

            <h2>☕ Cafés</h2>
            <div class="item">
                <span class="nome">Café Expresso</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 5,00</span>
            </div>
            <div class="item">
                <span class="nome">Cappuccino</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 8,00</span>
            </div>
            <div class="item">
                <span class="nome">Latte</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 7,00</span>
            </div>
            <div class="item">
                <span class="nome">Macchiato</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 7,50</span>
            </div>

            <h2>🥐 Lanches</h2>
            <div class="item">
                <span class="nome">Pão de Queijo</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 4,50</span>
            </div>
            <div class="item">
                <span class="nome">Croissant</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 7,50</span>
            </div>

            <h2>🍰 Sobremesas</h2>
            <div class="item">
                <span class="nome">Brownie</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 6,50</span>
            </div>
            <div class="item">
                <span class="nome">Cheesecake</span>
                <span class="linha-pontilhada"></span>
                <span class="preco">R$ 10,00</span>
            </div>
        </div>
    </section>

    <section class="lado-imagem">
        </section>

</main>

</body>
</html>
